// Tone standard — injected into every system prompt
// ───────────────────────────────────────────────────────────────
const TONE_STANDARD = `TONE STANDARD (strict):
- Be professional, calibrated, constructive. Push the student toward growth.
- NO effusive praise. Forbidden phrases: "太厉害了", "太棒了", "amazing", "impressive", "perfect", "绝对是亮点", "这绝对是加分项". Instead, state facts flatly: "A first-author workshop paper is a solid credential for industry SWE roles; for top PhD programs, main-conference submissions would matter more."
- NO false reassurance that discourages more work. Forbidden patterns: "没关系，你的经历已经很丰富了，不需要额外的项目/论文/实习", "you don't need more". If more work would genuinely help them reach the next level, SAY SO. Example: "Your 3 internships are a solid foundation; for competitive quant roles, consider 1-2 side projects demonstrating independent research initiative."
- Always acknowledge facts briefly, then point to the next level up. Your job is to help them improve, not to make them feel good.
- When giving feedback, be specific and actionable — name the thing to change and how to change it.`;

const languageInstruction = (lang) => {
  if (lang === 'zh') return 'LANGUAGE: Respond ONLY in Chinese (中文), regardless of what language the student writes in. All headers, labels, and tokens you output should be in Chinese too (except for the literal markers like [PROFILE_COMPLETE], [RESUME_REVIEWED], [RESUME_DRAFT_START], [RESUME_DRAFT_END], [REVISED], which must stay in English so the app can parse them).';
  return 'LANGUAGE: Respond ONLY in English, regardless of what language the student writes in.';
};

const buildSystemPrompt = (module, state) => {
  const {
    profile, progress, activeResume,
    targetRole, targetCompany, interviewMode, questionNumber,
    resumeSubmode, language,
  } = state;

  const profileContext = profile
    ? `STUDENT PROFILE (your persistent memory of this student):\n${JSON.stringify(profile, null, 2)}`
    : 'STUDENT PROFILE: Not yet built.';

  const progressContext = `PROGRESS STATE: ${JSON.stringify(progress)}`;

  const base = `You are an expert AI recruiting coach helping students land internships and full-time roles. You maintain a persistent memory of each student's profile across all sessions.

${profileContext}

${progressContext}

${languageInstruction(language)}

${TONE_STANDARD}

CONVERSATIONAL RULES: Always ask ONE question at a time. Never present a list of questions together. Adapt difficulty to the student's experience level.

ETHICAL GUARDRAIL: Never help fabricate experience or exaggerate credentials. Help the student express their real experience more clearly.`;

  // ─── ONBOARDING ───
  if (module === 'onboarding') {
    return base + `

CURRENT TASK: Onboarding. The student has already seen a brief greeting and been asked for their NAME. Continue the profile collection from there.

Collect these 10 fields IN THIS EXACT ORDER, ONE QUESTION AT A TIME:
1. name
2. school
3. grade/year
4. concentration/major
5. relevant coursework
6. past internships or work experience
7. research or publications
8. target country
9. target industry
10. target role

RULES:
- Look at STUDENT PROFILE above to see which fields are already filled. Continue from the first unfilled field.
- After each answer, acknowledge it in ONE SHORT factual sentence (NOT praise — e.g. "Got it." / "Noted." / "好的。"). Do NOT compliment schools, majors, or experiences. Just record and move on.
- NEVER batch questions. NEVER skip ahead.
- Once all 10 fields are collected, present a clean summary of the full profile and ask "Does this look right? / 这样对吗？"
- After the student explicitly confirms, respond with ONE brief congratulatory line (still no effusion), then display the updated progress tracker:

async function callClaude({ messages, system, expectJson = false, maxTokens = 2500, useWebSearch = false }) {
  try {
    const body = { model: MODEL, max_tokens: maxTokens, system, messages };
    if (useWebSearch) {
      body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];
    }

    // Get Supabase JWT for auth
    const session = await supabase.auth.getSession();
    const jwt = session?.data?.session?.access_token;
    if (!jwt) {
      return { raw: '', error: 'Not authenticated. Please log in again.' };
    }

    const response = await fetch('/api/claude', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${jwt}`,
      },
      body: JSON.stringify(body),
    });
    if (!response.ok) {
      const errText = await response.text();
      return { raw: '', error: `HTTP ${response.status}: ${errText.slice(0, 200)}` };
    }
    const data = await response.json();
    const text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n\n');

    if (expectJson) {
      const cleaned = text.replace(/```json|```/g, '').trim();
      const match = cleaned.match(/\{[\s\S]*\}/);
      const candidate = match ? match[0] : cleaned;
      try {
        return { json: JSON.parse(candidate), raw: text };
      } catch (e) {
        return { json: null, raw: text, parseError: e.message };
      }
    }
    return { raw: text };
  } catch (err) {
    return { raw: '', error: err.message };
  }
}

async function loadStorage(key, fallback) {
  try {
    if (!currentUserId) return fallback;
    const field = key.replace('coach:', '');
    if (field in dataCache) return dataCache[field];
    const { data, error } = await supabase
      .from('user_data')
      .select(field)
      .eq('user_id', currentUserId)
      .single();
    if (error || !data) return fallback;
    const val = data[field];
    if (val != null) {
      dataCache[field] = val;
      return val;
    }
    return fallback;
  } catch {
    return fallback;
  }
}
async function saveStorage(key, value) {
  if (!currentUserId) return;
  const field = key.replace('coach:', '');
  dataCache[field] = value;
  clearTimeout(saveTimers[field]);
  saveTimers[field] = setTimeout(async () => {
    try {
      await supabase.from('user_data').upsert(
        { user_id: currentUserId, [field]: value, updated_at: new Date().toISOString() },
        { onConflict: 'user_id' }
      );
    } catch (e) {
      console.error('Save failed:', field, e);
    }
  }, 1000);
}
async function clearAllStorage() {
  if (!currentUserId) return;
  dataCache = {};
  try {
    await supabase.from('user_data').delete().eq('user_id', currentUserId);
    // Re-create empty row
    await supabase.from('user_data').insert({ user_id: currentUserId });
  } catch {}
}

      const textParts = m.content.filter(b => b.type === 'text').map(b => b.text);
      const imageCount = m.content.filter(b => b.type === 'image').length;
      const imgNote = imageCount > 0 ? `\n[${imageCount} image${imageCount > 1 ? 's' : ''} attached]` : '';
      return { role: m.role, content: (textParts.join('\n') + imgNote).trim() };

const loadScript = (src, globalKey) => new Promise((resolve, reject) => {
  if (window[globalKey]) return resolve(window[globalKey]);
  const script = document.createElement('script');
  script.src = src;
  script.onload = () => {
    if (window[globalKey]) resolve(window[globalKey]);
    else reject(new Error(`${globalKey} did not initialize`));
  };
  script.onerror = () => reject(new Error(`Failed to load ${src}`));
  document.head.appendChild(script);
});

const escXml = (s) => (s == null ? '' : String(s))
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;')
  .replace(/'/g, '&apos;');

const docxRun = ({ text, bold = false, italic = false, size = null, color = null }) => {
  const rpr = [];
  if (bold) rpr.push('<w:b/>');
  if (italic) rpr.push('<w:i/>');
  if (size) rpr.push(`<w:sz w:val="${size * 2}"/>`); // half-points
  if (color) rpr.push(`<w:color w:val="${color}"/>`);
  const rprXml = rpr.length ? `<w:rPr>${rpr.join('')}</w:rPr>` : '';
  return `<w:r>${rprXml}<w:t xml:space="preserve">${escXml(text)}</w:t></w:r>`;
};

const docxTab = () => '<w:r><w:tab/></w:r>';

const docxParagraph = ({
  runs = [], align = null, tabRight = null,
  border = false, indent = null, spacing = null,
}) => {
  const pprParts = [];
  if (tabRight) {
    pprParts.push(`<w:tabs><w:tab w:val="right" w:pos="${tabRight}"/></w:tabs>`);
  }
  if (align) pprParts.push(`<w:jc w:val="${align}"/>`);
  if (border) pprParts.push('<w:pBdr><w:bottom w:val="single" w:sz="8" w:space="2" w:color="000000"/></w:pBdr>');
  if (indent) pprParts.push(`<w:ind w:left="${indent}" w:hanging="180"/>`);
  if (spacing) {
    const before = spacing.before || 0;
    const after = spacing.after || 0;
    pprParts.push(`<w:spacing w:before="${before}" w:after="${after}"/>`);
  }
  const ppr = pprParts.length ? `<w:pPr>${pprParts.join('')}</w:pPr>` : '';
  return `<w:p>${ppr}${runs.join('')}</w:p>`;
};

async function zipDocxParagraphs(paragraphs) {
  const JSZip = await loadJSZip();
  const zip = new JSZip();
  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>${paragraphs.join('')}
<w:sectPr>
<w:pgSz w:w="12240" w:h="15840"/>
<w:pgMar w:top="1080" w:right="1440" w:bottom="1080" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/>
</w:sectPr>
</w:body>
</w:document>`;
  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;
  const rootRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;
  zip.file('[Content_Types].xml', contentTypesXml);
  zip.folder('_rels').file('.rels', rootRelsXml);
  zip.folder('word').file('document.xml', documentXml);
  return await zip.generateAsync({ type: 'blob' });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function buildStructuredResumeDocx(data) {
  const paragraphs = [];
  // Centered name (24pt bold)
  paragraphs.push(docxParagraph({
    runs: [docxRun({ text: data.header?.name || '', bold: true, size: 24 })],
    align: 'center',
  }));
  // Centered contact (10pt)
  const contactParts = [data.header?.phone, data.header?.email, data.header?.location].filter(Boolean);
  if (contactParts.length) {
    const contactRuns = [];
    contactParts.forEach((p, i) => {
      if (i > 0) contactRuns.push(docxRun({ text: '  |  ', size: 10 }));
      contactRuns.push(docxRun({ text: p, size: 10 }));
    });
    paragraphs.push(docxParagraph({
      runs: contactRuns,
      align: 'center',
      spacing: { after: 160 },
    }));
  }
  // Sections
  for (const sec of data.sections || []) {
    paragraphs.push(docxParagraph({
      runs: [docxRun({ text: sec.title || '', bold: true, size: 13 })],
      border: true,
      spacing: { before: 200, after: 60 },
    }));
    for (const item of sec.items || []) {
      if (item.org || item.location) {
        const topRuns = [];
        if (item.org) topRuns.push(docxRun({ text: item.org, bold: true, size: 11 }));
        if (item.location) {
          topRuns.push(docxTab());
          topRuns.push(docxRun({ text: item.location, bold: true, size: 11 }));
        }
        paragraphs.push(docxParagraph({ runs: topRuns, tabRight: 9000 }));
      }
      if (item.role || item.dateRange) {
        const midRuns = [];
        if (item.role) midRuns.push(docxRun({ text: item.role, italic: true, size: 11 }));
        if (item.dateRange) {
          midRuns.push(docxTab());
          midRuns.push(docxRun({ text: item.dateRange, italic: true, size: 11 }));
        }
        paragraphs.push(docxParagraph({ runs: midRuns, tabRight: 9000 }));
      }
      for (const b of item.bullets || []) {
        if (!b) continue;
        paragraphs.push(docxParagraph({
          runs: [docxRun({ text: '• ' + b, size: 11 })],
          indent: 360,
        }));
      }
      paragraphs.push(docxParagraph({ runs: [], spacing: { after: 80 } }));
    }
  }
  return await zipDocxParagraphs(paragraphs);
}

async function buildMarkdownResumeDocx(content) {
  const paragraphs = [];
  for (const line of (content || '').split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) {
      paragraphs.push(docxParagraph({ runs: [] }));
      continue;
    }
    if (/^#\s/.test(trimmed)) {
      paragraphs.push(docxParagraph({
        runs: [docxRun({ text: trimmed.replace(/^#\s/, ''), bold: true, size: 20 })],
        align: 'center',
        spacing: { after: 120 },
      }));
    } else if (/^##\s/.test(trimmed)) {
      paragraphs.push(docxParagraph({
        runs: [docxRun({ text: trimmed.replace(/^##\s/, ''), bold: true, size: 13 })],
        border: true,
        spacing: { before: 200, after: 60 },
      }));
    } else if (/^###\s/.test(trimmed)) {
      paragraphs.push(docxParagraph({
        runs: [docxRun({ text: trimmed.replace(/^###\s/, ''), bold: true, size: 11 })],
      }));
    } else if (/^[-•*]\s/.test(trimmed)) {
      paragraphs.push(docxParagraph({
        runs: [docxRun({ text: '• ' + trimmed.replace(/^[-•*]\s/, ''), size: 11 })],
        indent: 360,
      }));
    } else {
      paragraphs.push(docxParagraph({
        runs: [docxRun({ text: trimmed, size: 11 })],
      }));
    }
  }
  return await zipDocxParagraphs(paragraphs);
}

// ───────────────────────────────────────────────────────────────
// File parsing
// ───────────────────────────────────────────────────────────────
async function extractFileText(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'txt' || ext === 'md') {
    return (await file.text()).trim();
  }
  if (ext === 'docx') {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer });
    return (result.value || '').trim();
  }
  if (ext === 'pdf') {
    const pdfjsLib = await loadPdfJs();
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      pages.push(content.items.map(item => item.str).join(' '));
    }
    return pages.join('\n\n').trim();
  }
  if (ext === 'xlsx' || ext === 'xls' || ext === 'csv') {
    const XLSX = await loadXlsx();
    const arrayBuffer = await file.arrayBuffer();
    const wb = XLSX.read(arrayBuffer, { type: 'array' });
    const parts = wb.SheetNames.map(name => {
      return `[Sheet: ${name}]\n${XLSX.utils.sheet_to_csv(wb.Sheets[name])}`;
    });
    return parts.join('\n\n').trim();
  }
  throw new Error(`Unsupported file type: .${ext} (supported: PDF, DOCX, XLSX, CSV, TXT)`);
}

async function fileToBase64Image(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const base64 = result.split(',')[1];
      resolve({ base64, mediaType: file.type });
    };
    reader.onerror = () => reject(new Error('Failed to read image'));
    reader.readAsDataURL(file);
  });
}

const EMPTY_RESUME = () => ({
  header: { name: '', phone: '', email: '', location: '', links: [] },
  sections: [],
});

const EMPTY_ITEM = () => ({
  org: '', role: '', location: '', dateRange: '', bullets: [],
});

function structuredToPlainText(r) {
  if (!r) return '';
  const lines = [];
  if (r.header) {
    if (r.header.name) lines.push(r.header.name);
    const contact = [r.header.phone, r.header.email, r.header.location].filter(Boolean).join(' | ');
    if (contact) lines.push(contact);
    lines.push('');
  }
  for (const sec of r.sections || []) {
    lines.push(`## ${sec.title || ''}`);
    for (const item of sec.items || []) {
      const top = [item.org, item.location].filter(Boolean).join('  ');
      const mid = [item.role, item.dateRange].filter(Boolean).join('  ');
      if (top) lines.push(top);
      if (mid) lines.push(mid);
      for (const b of item.bullets || []) lines.push(`• ${b}`);
      lines.push('');
    }
  }
  return lines.join('\n').trim();
}

// Ask Claude to convert a plain-text/markdown resume into our structured schema
async function parseResumeTextToStructured(text, language) {
  const langInstr = language === 'zh'
    ? 'All section titles must be in Chinese.'
    : 'All section titles must be in English.';
  const system = `You are a resume parser. Convert the given resume text into structured JSON matching this exact schema:

{
  "header": { "name": "", "phone": "", "email": "", "location": "", "links": [] },
  "sections": [
    {
      "type": "education|research|experience|projects|skills|awards|other",
      "title": "",
      "items": [
        { "org": "", "role": "", "location": "", "dateRange": "", "bullets": [] }
      ]
    }
  ]
}

Rules:
- Every item MUST have all 5 fields (use "" or [] if missing).
- org = company/school/project/paper title (shown bold)
- role = job title / degree / authorship line (shown italic)
- dateRange = date or date range string
- bullets = array of achievement strings, each starting with an action verb, kept verbatim from source
- Preserve all information from the source — do NOT invent or drop content
- ${langInstr}
- Output ONLY the JSON, no markdown fences, no prose.`;

  const result = await callClaude({
    messages: [{ role: 'user', content: `Resume text:\n\n${text}` }],
    system,
    maxTokens: 4000,
  });
  if (!result.raw) return null;
  const cleaned = result.raw.replace(/```json|```/g, '').trim();
  const match = cleaned.match(/\{[\s\S]*\}/);
  if (!match) return null;
  try {
    return JSON.parse(match[0]);
  } catch {
    return null;
  }
}

// ───────────────────────────────────────────────────────────────
// Markdown renderer
// ───────────────────────────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return null;
  const lines = text.split('\n');
  const blocks = [];
  let listBuffer = [];

  const flushList = () => {
    if (listBuffer.length) {
      blocks.push(
        <ul key={`ul-${blocks.length}`} className="my-2 space-y-1 pl-4">
          {listBuffer.map((item, i) => (
            <li key={i} className="text-[14.5px] leading-relaxed list-disc marker:text-[#4A7C59]">
              {renderInline(item)}
            </li>
          ))}
        </ul>
      );
      listBuffer = [];
    }
  };

  lines.forEach((line, idx) => {
    const trimmed = line.trim();
    if (/^[-•*]\s/.test(trimmed)) {
      listBuffer.push(trimmed.replace(/^[-•*]\s/, ''));
    } else if (/^#{1,3}\s/.test(trimmed)) {
      flushList();
      const level = trimmed.match(/^#+/)[0].length;
      const content = trimmed.replace(/^#+\s/, '');
      const size = level === 1 ? 'text-lg' : level === 2 ? 'text-base' : 'text-sm';
      blocks.push(
        <div key={idx} className={`font-display ${size} font-semibold mt-3 mb-1 text-[#0F3D2E]`}>
          {renderInline(content)}
        </div>
      );
    } else if (trimmed === '') {
      flushList();
    } else {
      flushList();
      blocks.push(
        <p key={idx} className="text-[14.5px] leading-relaxed my-1.5">
          {renderInline(trimmed)}
        </p>
      );
    }
  });
  flushList();
  return blocks;
}

function renderInline(text) {
  const parts = [];
  let remaining = text;
  let key = 0;
  while (remaining.length) {
    const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
    const italicMatch = remaining.match(/\*(.+?)\*/);
    const firstBold = boldMatch ? boldMatch.index : Infinity;
    const firstItalic = italicMatch ? italicMatch.index : Infinity;
    if (firstBold === Infinity && firstItalic === Infinity) {
      parts.push(remaining);
      break;
    }
    if (firstBold <= firstItalic) {
      if (firstBold > 0) parts.push(remaining.slice(0, firstBold));
      parts.push(<strong key={key++} className="font-semibold text-[#0F3D2E]">{boldMatch[1]}</strong>);
      remaining = remaining.slice(firstBold + boldMatch[0].length);
    } else {
      if (firstItalic > 0) parts.push(remaining.slice(0, firstItalic));
      parts.push(<em key={key++} className="italic text-[#4A7C59]">{italicMatch[1]}</em>);
      remaining = remaining.slice(firstItalic + italicMatch[0].length);
    }
  }
  return parts;
}

const RUBRIC_DIMENSIONS = [
  { key: 'structure',       label: 'Structure',       max: 5 },
  { key: 'technical_depth', label: 'Technical Depth', max: 5 },
  { key: 'communication',   label: 'Communication',   max: 5 },
  { key: 'role_fit',        label: 'Role Fit',        max: 5 },
  { key: 'red_flags',       label: 'Red Flags',       max: 3, inverse: true },
];

function RubricBars({ rubric, t }) {
  if (!rubric) return null;
  const labelFor = (key) => {
    if (!t) return RUBRIC_DIMENSIONS.find(d => d.key === key)?.label;
    return key === 'structure' ? t.dimStructure
         : key === 'technical_depth' ? t.dimTechnicalDepth
         : key === 'communication' ? t.dimCommunication
         : key === 'role_fit' ? t.dimRoleFit
         : t.dimRedFlags;
  };
  return (
    <div className="mt-3 space-y-1.5">
      {RUBRIC_DIMENSIONS.map(dim => {
        const val = rubric[dim.key] ?? 0;
        const pct = (val / dim.max) * 100;
        const color = dim.inverse
          ? (val === 0 ? '#4A7C59' : val === 1 ? '#C8A96B' : '#B85C50')
          : '#0F3D2E';
        return (
          <div key={dim.key} className="flex items-center gap-3">
            <div className="w-28 text-[11px] uppercase tracking-wider text-[#6B7A72]">{labelFor(dim.key)}</div>
            <div className="flex-1 h-[3px] bg-[#E8EDE4] rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-all duration-500"
                   style={{ width: `${pct}%`, background: color }} />
            </div>
            <div className="w-8 text-right text-[11px] font-mono text-[#0F3D2E]">{val}/{dim.max}</div>
          </div>
        );
      })}
    </div>
  );
}

// ───────────────────────────────────────────────────────────────
// Main component
// ───────────────────────────────────────────────────────────────
function CoachApp() {
  const [storageReady, setStorageReady] = useState(false);
  const [profile, setProfile] = useState(null);
  const [currentModule, setCurrentModule] = useState('onboarding');
  const [conversations, setConversations] = useState({ onboarding: [], resume: [], interview: [] });

  const [rubricHistory, setRubricHistory] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [showMemory, setShowMemory] = useState(false);

  // Language
  const [language, setLanguage] = useState('en');

  // Resume state
  const [resumes, setResumes] = useState([]);
  const [activeResumeId, setActiveResumeId] = useState(null);
  const [resumeSubmode, setResumeSubmode] = useState(null); // null | 'review' | 'build'
  const [uploadingFile, setUploadingFile] = useState(false);
  const [uploadError, setUploadError] = useState(null);

  // Image attachments (only in resume build mode)
  const [pendingAttachments, setPendingAttachments] = useState([]);

  // Resume editor
  const [editingResumeId, setEditingResumeId] = useState(null);

  // Interview state
  const [targetRole, setTargetRole] = useState('');
  const [targetCompany, setTargetCompany] = useState('');
  const [interviewMode, setInterviewMode] = useState('full');
  const [interviewStarted, setInterviewStarted] = useState(false);
  const [questionNumber, setQuestionNumber] = useState(0);

  const messagesEndRef = useRef(null);
  const fileInputRef = useRef(null);
  const imageInputRef = useRef(null);

  const activeResume = resumes.find(r => r.id === activeResumeId) || null;
  const editingResume = resumes.find(r => r.id === editingResumeId) || null;
  const t = getT(language);

  // ── Load
  useEffect(() => {
    (async () => {
      const [p, c, pr, rh, rs, settings] = await Promise.all([
        loadStorage(STORAGE_KEYS.profile, null),
        loadStorage(STORAGE_KEYS.conversations, { onboarding: [], resume: [], interview: [] }),
        loadStorage(STORAGE_KEYS.progress, { profile: false, resume: false, interview: false }),
        loadStorage(STORAGE_KEYS.rubric, []),
        loadStorage(STORAGE_KEYS.resumes, []),
        loadStorage(STORAGE_KEYS.settings, {}),
      ]);
      setProfile(p);
      setConversations(c);
      setProgress(pr);
      setRubricHistory(rh);
      setResumes(rs);
      if (settings.activeResumeId) setActiveResumeId(settings.activeResumeId);
      if (settings.targetRole) setTargetRole(settings.targetRole);
      if (settings.targetCompany) setTargetCompany(settings.targetCompany);
      if (settings.interviewMode) setInterviewMode(settings.interviewMode);
      if (settings.language && settings.language !== 'auto') setLanguage(settings.language);
      if (settings.resumeSubmode) setResumeSubmode(settings.resumeSubmode);
      setStorageReady(true);
    })();
  }, []);

  // ── Save
  useEffect(() => { if (storageReady) saveStorage(STORAGE_KEYS.profile, profile); }, [profile, storageReady]);
  useEffect(() => {
    if (storageReady) {
      const sanitized = {
        onboarding: serializeMessagesForStorage(conversations.onboarding),
        resume: serializeMessagesForStorage(conversations.resume),
        interview: serializeMessagesForStorage(conversations.interview),
      };
      saveStorage(STORAGE_KEYS.conversations, sanitized);
    }
  }, [conversations, storageReady]);
  useEffect(() => { if (storageReady) saveStorage(STORAGE_KEYS.progress, progress); }, [progress, storageReady]);
  useEffect(() => { if (storageReady) saveStorage(STORAGE_KEYS.rubric, rubricHistory); }, [rubricHistory, storageReady]);
  useEffect(() => { if (storageReady) saveStorage(STORAGE_KEYS.resumes, resumes); }, [resumes, storageReady]);
  useEffect(() => {
    if (storageReady) saveStorage(STORAGE_KEYS.settings, {
      activeResumeId, targetRole, targetCompany, interviewMode, language, resumeSubmode,
    });
  }, [activeResumeId, targetRole, targetCompany, interviewMode, language, resumeSubmode, storageReady]);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [conversations, currentModule, loading]);

  const currentMessages = conversations[currentModule] || [];
  const inBuildMode = currentModule === 'resume' && resumeSubmode === 'build';

  // ── Resume file upload
  const handleFileUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setUploadingFile(true);
    setUploadError(null);
    try {
      const text = await extractFileText(file);
      if (!text || text.length < 20) {
        throw new Error(t.scannedPdfError);
      }
      const newResume = {
        id: `r_${Date.now()}`,
        filename: file.name,
        uploadedAt: new Date().toISOString(),
        text: text.slice(0, 15000),
        size: file.size,
        source: 'upload',
      };
      setResumes(prev => [...prev, newResume]);
      setActiveResumeId(newResume.id);
    } catch (err) {
      setUploadError(err.message);
    } finally {
      setUploadingFile(false);
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  };

  // ── Build-mode attachment (files OR images)
  const handleBuildFileAttach = async (e) => {
    const files = Array.from(e.target.files || []);
    setUploadError(null);
    for (const file of files) {
      if (file.type.startsWith('image/')) {
        if (file.size > 5 * 1024 * 1024) {
          setUploadError(t.imageTooLarge(file.name));
          continue;
        }
        try {
          const { base64, mediaType } = await fileToBase64Image(file);
          setPendingAttachments(prev => [...prev, {
            id: `att_${Date.now()}_${Math.random()}`,
            kind: 'image',
            name: file.name,
            mediaType,
            base64,
          }]);
        } catch (err) {
          setUploadError(err.message);
        }
      } else {
        try {
          const text = await extractFileText(file);
          if (!text || text.length < 5) throw new Error(t.scannedPdfError);
          setPendingAttachments(prev => [...prev, {
            id: `att_${Date.now()}_${Math.random()}`,
            kind: 'text',
            name: file.name,
            text: text.slice(0, 10000),
          }]);
        } catch (err) {
          setUploadError(err.message);
        }
      }
    }
    if (imageInputRef.current) imageInputRef.current.value = '';
  };

  // ── Start resume review
  const startResumeReview = async (resumeId) => {
    const r = resumes.find(x => x.id === resumeId);
    if (!r) return;
    setActiveResumeId(resumeId);
    setResumeSubmode('review');
    setConversations(prev => ({ ...prev, resume: [] }));
    setLoading(true);

    const system = buildSystemPrompt('resume', {
      profile, progress, activeResume: r, resumeSubmode: 'review', language,
    });
    const result = await callClaude({
      messages: [{ role: 'user', content: 'Please review my resume.' }],
      system,
      maxTokens: 3000,
    });
    setLoading(false);

    let text = result.raw || (result.error ? `⚠️ ${result.error}` : '(No response)');
    const reviewed = text.includes('[RESUME_REVIEWED]');
    if (reviewed) text = text.replace(/\[RESUME_REVIEWED\]/g, '').trim();

    setConversations(prev => ({ ...prev, resume: [{ role: 'assistant', content: text }] }));
    if (reviewed) setProgress(prev => ({ ...prev, resume: true }));
  };

  // ── Start resume build
  const startResumeBuild = async () => {
    setResumeSubmode('build');
    // If there's already an in-progress build conversation, resume it — don't wipe
    if ((conversations.resume || []).length > 0) {
      return;
    }
    setLoading(true);

    const system = buildSystemPrompt('resume', {
      profile, progress, activeResume: null, resumeSubmode: 'build', language,
    });
    const result = await callClaude({
      messages: [{ role: 'user', content: "I don't have a resume yet. Help me build one." }],
      system,
      maxTokens: 1500,
    });
    setLoading(false);

    const text = result.raw || (result.error ? `⚠️ ${result.error}` : '(No response)');
    setConversations(prev => ({ ...prev, resume: [{ role: 'assistant', content: text }] }));
  };

  // ── Start interview
  const startInterview = async () => {
    if (!targetRole.trim() || !targetCompany.trim()) return;
    setInterviewStarted(true);
    setQuestionNumber(0);
    setConversations(prev => ({ ...prev, interview: [] }));
    setLoading(true);

    const system = buildInterviewResearchPrompt({
      profile, activeResume, targetRole, targetCompany, interviewMode, language,
    });
    const result = await callClaude({
      messages: [{ role: 'user', content: '[BEGIN_RESEARCH_AND_INTERVIEW]' }],
      system,
      useWebSearch: true,
      maxTokens: 3500,
    });
    setLoading(false);

    const text = result.raw || (result.error ? `⚠️ ${result.error}\n\nStarting without research — tell me about yourself.` : 'Tell me about yourself.');
    setConversations(prev => ({
      ...prev,
      interview: [{ role: 'assistant', content: text, isResearch: true }],
    }));
    setQuestionNumber(1);
  };

  // ── Send handler
  const handleSend = async () => {
    const text = input.trim();
    if ((!text && pendingAttachments.length === 0) || loading) return;

    // Build user content — split attachments by kind
    const imageAtts = pendingAttachments.filter(a => a.kind === 'image');
    const textAtts  = pendingAttachments.filter(a => a.kind === 'text');

    const textPrefix = textAtts.length > 0
      ? textAtts.map(a => `--- Attached file: ${a.name} ---\n${a.text}\n--- End of ${a.name} ---`).join('\n\n') + '\n\n'
      : '';
    const combinedText = textPrefix + (text || (pendingAttachments.length > 0 ? 'Here are some materials for my resume.' : ''));

    let userContent;
    if (imageAtts.length > 0) {
      userContent = [
        ...imageAtts.map(att => ({
          type: 'image',
          source: { type: 'base64', media_type: att.mediaType, data: att.base64 },
        })),
        { type: 'text', text: combinedText },
      ];
    } else {
      userContent = combinedText;
    }

    const userMsg = {
      role: 'user',
      content: userContent,
      displayAttachments: pendingAttachments.length > 0 ? [...pendingAttachments] : undefined,
    };

    setInput('');
    setPendingAttachments([]);

    const newMessages = [...currentMessages, userMsg];
    setConversations(prev => ({ ...prev, [currentModule]: newMessages }));
    setLoading(true);

    const system = buildSystemPrompt(currentModule, {
      profile, progress, activeResume,
      targetRole, targetCompany, interviewMode,
      questionNumber: currentModule === 'interview' ? questionNumber : 0,
      resumeSubmode, language,
    });

    // Convert messages for API — preserve multi-block content
    const apiMessages = newMessages.map(m => {
      if (m.isInterview && m.meta) {
        const parts = [];
        if (m.meta.feedback) parts.push(`[feedback]: ${m.meta.feedback}`);
        if (m.meta.nextQuestion) parts.push(`[question]: ${m.meta.nextQuestion}`);
        return { role: 'assistant', content: parts.join('\n') };
      }
      return { role: m.role, content: m.content };
    });

    const expectJson = currentModule === 'interview';
    // Enable web_search in build mode so Claude can fetch GitHub/LinkedIn/portfolio links
    const useWebSearch = inBuildMode;
    const result = await callClaude({ messages: apiMessages, system, expectJson, maxTokens: 3000, useWebSearch });
    setLoading(false);

    if (currentModule === 'interview' && result.json) {
      const { feedback, rubric, next_question, question_type, question_label } = result.json;

      if (questionNumber > 0 && rubric) {
        setRubricHistory(prev => [...prev, {
          timestamp: Date.now(),
          questionNumber,
          questionType: question_type,
          questionLabel: question_label,
          scores: rubric,
          targetRole,
          targetCompany,
        }]);
      }

      const done = next_question === 'INTERVIEW_COMPLETE';
      const meta = done
        ? { feedback, rubric, done: true }
        : { feedback, rubric, nextQuestion: next_question, questionLabel: question_label, questionType: question_type };

      setConversations(prev => ({
        ...prev,
        interview: [...prev.interview, { role: 'assistant', content: '', meta, isInterview: true }],
      }));

      if (done) setProgress(prev => ({ ...prev, interview: true }));
      else setQuestionNumber(prev => prev + 1);
    } else {
      let responseText = result.raw || (result.error ? `⚠️ ${result.error}` : '(No response)');
      let profileComplete = null;
      let resumeDraft = null;

      const profileMatch = responseText.match(/\[PROFILE_COMPLETE\]\s*(\{[\s\S]*?\})/);
      if (profileMatch) {
        try {
          profileComplete = JSON.parse(profileMatch[1]);
          responseText = responseText.replace(/\[PROFILE_COMPLETE\][\s\S]*?\}/, '').trim();
        } catch {}
      }

      const draftMatch = responseText.match(/\[RESUME_DRAFT_START\]([\s\S]*?)\[RESUME_DRAFT_END\]/);
      if (draftMatch) {
        resumeDraft = draftMatch[1].trim();
      }

      // New structured JSON format
      let resumeStructured = null;
      const jsonMatch = responseText.match(/\[RESUME_JSON_START\]([\s\S]*?)\[RESUME_JSON_END\]/);
      if (jsonMatch) {
        try {
          resumeStructured = JSON.parse(jsonMatch[1].trim());
        } catch (e) {
          console.error('Failed to parse RESUME_JSON:', e);
        }
      }

      const resumeReviewed = responseText.includes('[RESUME_REVIEWED]');
      responseText = responseText
        .replace(/\[RESUME_REVIEWED\]/g, '')
        .replace(/\[RESUME_DRAFT_START\][\s\S]*?\[RESUME_DRAFT_END\]/g, '')
        .replace(/\[RESUME_JSON_START\][\s\S]*?\[RESUME_JSON_END\]/g, '')
        .trim();

      setConversations(prev => ({
        ...prev,
        [currentModule]: [...prev[currentModule], { role: 'assistant', content: responseText }],
      }));

      if (profileComplete) {
        setProfile(profileComplete);
        setProgress(prev => ({ ...prev, profile: true }));
      }
      if (resumeStructured) {
        const name = resumeStructured.header?.name || 'draft';
        const newResume = {
          id: `r_${Date.now()}`,
          filename: `${name}-${new Date().toISOString().slice(0, 10)}.resume`,
          uploadedAt: new Date().toISOString(),
          text: structuredToPlainText(resumeStructured),
          structured: resumeStructured,
          size: 0,
          source: 'built',
        };
        setResumes(prev => [...prev, newResume]);
        setActiveResumeId(newResume.id);
        setTimeout(() => setEditingResumeId(newResume.id), 600);
      } else if (resumeDraft) {
        // Legacy markdown fallback
        const newResume = {
          id: `r_${Date.now()}`,
          filename: `draft-${new Date().toISOString().slice(0, 10)}.md`,
          uploadedAt: new Date().toISOString(),
          text: resumeDraft,
          size: resumeDraft.length,
          source: 'built',
        };
        setResumes(prev => [...prev, newResume]);
        setActiveResumeId(newResume.id);
        setTimeout(() => setEditingResumeId(newResume.id), 600);
      }
      if (resumeReviewed) {
        setProgress(prev => ({ ...prev, resume: true }));
      }
    }
  };

  // ── Save edited resume (text or structured)
  const saveEditedResume = (id, update) => {
    setResumes(prev => prev.map(r => {
      if (r.id !== id) return r;
      const patch = { updatedAt: new Date().toISOString() };
      if (typeof update === 'string') {
        patch.text = update;
      } else if (update && typeof update === 'object') {
        patch.structured = update;
        patch.text = structuredToPlainText(update);
      }
      return { ...r, ...patch };
    }));
  };

  // ── Delete / reset
  const deleteResume = (id) => {
    if (!confirm(t.confirmDeleteResume)) return;
    setResumes(prev => prev.filter(r => r.id !== id));
    if (activeResumeId === id) setActiveResumeId(null);
    if (editingResumeId === id) setEditingResumeId(null);
  };
  const resetResumeModule = () => {
    setResumeSubmode(null);
    setConversations(prev => ({ ...prev, resume: [] }));
    setPendingAttachments([]);
  };
  const resetInterviewModule = () => {
    setInterviewStarted(false);
    setQuestionNumber(0);
    setConversations(prev => ({ ...prev, interview: [] }));
  };

  const handleClearAll = async () => {
    if (!confirm(t.confirmClearAll)) return;
    await clearAllStorage();
    setProfile(null);
    setConversations({ onboarding: [], resume: [], interview: [] });
    setProgress({ profile: false, resume: false, interview: false });
    setRubricHistory([]);
    setResumes([]);
    setActiveResumeId(null);
    setEditingResumeId(null);
    setResumeSubmode(null);
    setTargetRole('');
    setTargetCompany('');
    setInterviewStarted(false);
    setQuestionNumber(0);
    setShowMemory(false);
    setCurrentModule('onboarding');
  };

  // ───────────────────────────────────────────────────────────
  // Render
  // ───────────────────────────────────────────────────────────
  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap');
        :root {
          --bg: #FBFAF7;
          --bg-sunk: #F5F3EE;
          --paper: #FFFFFF;
          --ink: #1A2420;
          --ink-soft: #4A5550;
          --ink-mute: #8A9590;
          --forest: #0F3D2E;
          --sage: #4A7C59;
          --mint: #E8EDE4;
          --line: rgba(15, 61, 46, 0.12);
          --line-soft: rgba(15, 61, 46, 0.06);
          --danger: #B85C50;
          --warn-bg: #FFF6E8;
          --warn-border: #E8D6A8;
          --warn-text: #5C4820;
        }
        html, body, #root { background: var(--bg); }
        .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
        .font-body    { font-family: 'Geist', system-ui, sans-serif; }
        .font-mono    { font-family: 'Geist Mono', ui-monospace, monospace; }
        .eyebrow      { font-family: 'Geist', sans-serif; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); font-weight: 500; }
        textarea, input, select { font-family: 'Geist', system-ui, sans-serif; }
        textarea:focus, input:focus, select:focus { outline: none; border-color: var(--forest) !important; }
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .dots span { display: inline-block; width: 4px; height: 4px; margin: 0 1px; border-radius: 50%; background: var(--sage); animation: dot 1.2s infinite ease-in-out; }
        .dots span:nth-child(2) { animation-delay: 0.15s; }
        .dots span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes dot { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
      `}</style>

      <div className="font-body h-screen flex text-[var(--ink)]" style={{ background: 'var(--bg)' }}>
        {/* ═══════ SIDEBAR ═══════ */}
        <aside className="w-[280px] flex-shrink-0 flex flex-col" style={{ background: 'var(--bg-sunk)', borderRight: '1px solid var(--line-soft)' }}>
          <div className="px-7 pt-8 pb-6">
            <div className="flex items-center gap-2">
              <div className="w-2 h-2 rounded-full" style={{ background: 'var(--forest)' }} />
              <div className="eyebrow">{t.estLabel}</div>
            </div>
            <h1 className="font-display text-[28px] leading-none mt-3" style={{ color: 'var(--forest)' }}>
              Coach<span className="italic" style={{ color: 'var(--sage)' }}>.</span>
            </h1>
            <div className="text-[12px] mt-1.5" style={{ color: 'var(--ink-soft)' }}>
              {t.brandTagline}
            </div>
          </div>

          <div className="h-px mx-7" style={{ background: 'var(--line-soft)' }} />

          <div className="px-7 py-6">
            <div className="eyebrow mb-4">{t.progress}</div>
            <div className="space-y-3">
              {PROGRESS_STEPS.map(step => {
                const done = progress[step.key];
                const label = step.key === 'profile' ? t.stepProfile
                            : step.key === 'resume' ? t.stepResume
                            : t.stepInterview;
                return (
                  <div key={step.key} className="flex items-center gap-3">
                    <div className="w-4 h-4 rounded-full flex items-center justify-center flex-shrink-0"
                         style={{
                           background: done ? 'var(--forest)' : 'transparent',
                           border: done ? 'none' : '1px solid var(--line)',
                         }}>
                      {done && <Check size={10} strokeWidth={3} color="white" />}
                    </div>
                    <div className={`text-[13px] ${done ? 'text-[var(--ink)]' : 'text-[var(--ink-mute)]'}`}>
                      {label}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="h-px mx-7" style={{ background: 'var(--line-soft)' }} />

          <div className="px-7 py-6 flex-1">
            <div className="eyebrow mb-4">{t.modules}</div>
            <nav className="space-y-1">
              {MODULES.map(m => {
                const Icon = m.icon;
                const active = currentModule === m.id;
                const label = m.id === 'onboarding' ? t.moduleOnboarding
                            : m.id === 'resume' ? t.moduleResume
                            : m.id === 'interview' ? t.moduleInterview
                            : t.moduleDashboard;
                return (
                  <button
                    key={m.id}
                    onClick={() => setCurrentModule(m.id)}
                    className="w-full flex items-center gap-3 px-3 py-2.5 rounded-md text-left transition-all"
                    style={{
                      background: active ? 'var(--paper)' : 'transparent',
                      boxShadow: active ? '0 1px 2px rgba(15,61,46,0.04), 0 0 0 1px var(--line-soft)' : 'none',
                      color: active ? 'var(--forest)' : 'var(--ink-soft)',
                    }}
                  >
                    <Icon size={15} strokeWidth={active ? 2.25 : 1.75} />
                    <span className="text-[13px]" style={{ fontWeight: active ? 500 : 400 }}>{label}</span>
                    {active && <ArrowRight size={12} className="ml-auto" />}
                  </button>
                );
              })}
            </nav>
          </div>

          <div className="px-7">
            <div className="h-px" style={{ background: 'var(--line-soft)' }} />
          </div>

          {/* Language toggle */}
          <div className="px-7 py-5">
            <div className="eyebrow mb-2.5">{t.language}</div>
            <div className="flex gap-1 p-1 rounded-md"
                 style={{ background: 'var(--paper)', border: '1px solid var(--line-soft)' }}>
              {LANGUAGES.map(opt => (
                <button
                  key={opt.id}
                  onClick={() => setLanguage(opt.id)}
                  className="flex-1 py-1.5 rounded text-[11px] font-medium transition-all"
                  style={{
                    background: language === opt.id ? 'var(--forest)' : 'transparent',
                    color: language === opt.id ? 'white' : 'var(--ink-soft)',
                  }}
                >
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          <div className="px-7 pb-7">
            <button
              onClick={() => setShowMemory(true)}
              className="w-full flex items-center justify-between px-3 py-2.5 rounded-md border transition-colors hover:bg-[var(--paper)]"
              style={{ borderColor: 'var(--line-soft)' }}
            >
              <div className="flex items-center gap-2">
                <Sparkles size={13} color="var(--sage)" />
                <span className="text-[12px] text-[var(--ink-soft)]">{t.whatIRemember}</span>
              </div>
              <ArrowRight size={11} color="var(--ink-mute)" />
            </button>
          </div>
        </aside>

        {/* ═══════ MAIN ═══════ */}
        <main className="flex-1 flex flex-col min-w-0">
          <header className="px-12 pt-10 pb-6" style={{ borderBottom: '1px solid var(--line-soft)' }}>
            <div className="eyebrow">
              {t.moduleCounter(MODULES.findIndex(m => m.id === currentModule) + 1, MODULES.length)}
            </div>
            <div className="flex items-baseline justify-between mt-2">
              <h2 className="font-display text-[36px] leading-none" style={{ color: 'var(--forest)' }}>
                {currentModule === 'onboarding' ? t.moduleOnboarding
                 : currentModule === 'resume' ? t.moduleResume
                 : currentModule === 'interview' ? t.moduleInterview
                 : t.moduleDashboard}
              </h2>
              <div className="flex items-center gap-3">
                {currentModule === 'resume' && resumeSubmode && (
                  <button onClick={resetResumeModule}
                          className="flex items-center gap-1.5 text-[11px] uppercase tracking-wider text-[var(--ink-mute)] hover:text-[var(--forest)]">
                    <RefreshCw size={11} /> {t.backToLibrary}
                  </button>
                )}
                {currentModule === 'interview' && interviewStarted && (
                  <button onClick={resetInterviewModule}
                          className="flex items-center gap-1.5 text-[11px] uppercase tracking-wider text-[var(--ink-mute)] hover:text-[var(--forest)]">
                    <RefreshCw size={11} /> {t.reset}
                  </button>
                )}
              </div>
            </div>
            <p className="text-[13px] mt-2 max-w-2xl" style={{ color: 'var(--ink-soft)' }}>
              {currentModule === 'onboarding' && t.onboardingSub}
              {currentModule === 'resume'     && t.resumeSub}
              {currentModule === 'interview'  && t.interviewSub}
              {currentModule === 'dashboard'  && t.dashboardSub}
            </p>
          </header>

          <div className="flex-1 overflow-y-auto chat-scroll">
            <div className="max-w-3xl mx-auto px-12 py-8">

              {currentModule === 'resume' && !resumeSubmode && (
                <ResumeLibrary
                  t={t}
                  resumes={resumes}
                  activeResumeId={activeResumeId}
                  setActiveResumeId={setActiveResumeId}
                  startResumeReview={startResumeReview}
                  startResumeBuild={startResumeBuild}
                  deleteResume={deleteResume}
                  openEditor={(id) => setEditingResumeId(id)}
                  fileInputRef={fileInputRef}
                  handleFileUpload={handleFileUpload}
                  uploadingFile={uploadingFile}
                  uploadError={uploadError}
                />
              )}

              {currentModule === 'interview' && !interviewStarted && (
                <InterviewSetup
                  t={t}
                  targetRole={targetRole}
                  setTargetRole={setTargetRole}
                  targetCompany={targetCompany}
                  setTargetCompany={setTargetCompany}
                  interviewMode={interviewMode}
                  setInterviewMode={setInterviewMode}
                  resumes={resumes}
                  activeResumeId={activeResumeId}
                  setActiveResumeId={setActiveResumeId}
                  startInterview={startInterview}
                  loading={loading}
                  setCurrentModule={setCurrentModule}
                />
              )}

              {currentModule === 'dashboard' && (
                <Dashboard t={t} profile={profile} progress={progress} rubricHistory={rubricHistory} resumes={resumes} />
              )}

              {(currentModule === 'onboarding'
                || (currentModule === 'resume' && resumeSubmode)
                || (currentModule === 'interview' && interviewStarted)) && (
                <div className="space-y-6">
                  {currentMessages.length === 0 && !loading && currentModule === 'onboarding' && (
                    <MessageBubble role="assistant">
                      {renderMarkdown(getOnboardingWelcome(profile, language))}
                    </MessageBubble>
                  )}

                  {currentMessages.map((msg, idx) => (
                    <MessageBubble key={idx} role={msg.role} attachments={msg.displayAttachments}>
                      {msg.isInterview ? (
                        <InterviewMessage t={t} meta={msg.meta} />
                      ) : msg.isResearch ? (
                        <div>
                          <div className="eyebrow mb-2" style={{ color: 'var(--sage)' }}>{t.researchFirstQ}</div>
                          {renderMarkdown(msg.content)}
                        </div>
                      ) : (
                        renderMarkdown(typeof msg.content === 'string' ? msg.content : extractTextContent(msg.content))
                      )}
                    </MessageBubble>
                  ))}

                  {loading && (
                    <MessageBubble role="assistant">
                      <div className="dots py-1"><span /><span /><span /></div>
                    </MessageBubble>
                  )}

                  <div ref={messagesEndRef} />
                </div>
              )}
            </div>
          </div>

          {/* INPUT */}
          {(currentModule === 'onboarding'
            || (currentModule === 'resume' && resumeSubmode)
            || (currentModule === 'interview' && interviewStarted)) && (
            <div className="px-12 py-6" style={{ borderTop: '1px solid var(--line-soft)', background: 'var(--bg)' }}>
              <div className="max-w-3xl mx-auto">
                {/* Attachment chips */}
                {pendingAttachments.length > 0 && (
                  <div className="flex flex-wrap gap-2 mb-2">
                    {pendingAttachments.map(att => (
                      <div key={att.id} className="flex items-center gap-2 px-2 py-1 rounded-md border"
                           style={{ borderColor: 'var(--line)', background: 'var(--paper)' }}>
                        {att.kind === 'image' ? (
                          <img src={`data:${att.mediaType};base64,${att.base64}`}
                               alt={att.name}
                               className="w-8 h-8 object-cover rounded" />
                        ) : (
                          <div className="w-8 h-8 rounded flex items-center justify-center flex-shrink-0"
                               style={{ background: 'var(--mint)' }}>
                            <FileText size={12} color="var(--forest)" />
                          </div>
                        )}
                        <div className="flex flex-col min-w-0">
                          <span className="text-[11px] max-w-[160px] truncate" style={{ color: 'var(--ink)' }}>
                            {att.name}
                          </span>
                          {att.kind === 'text' && (
                            <span className="text-[9px]" style={{ color: 'var(--ink-mute)' }}>
                              {(att.text.length / 1000).toFixed(1)}k chars
                            </span>
                          )}
                        </div>
                        <button
                          onClick={() => setPendingAttachments(prev => prev.filter(a => a.id !== att.id))}
                          className="text-[var(--ink-mute)] hover:text-[var(--danger)]"
                        >
                          <X size={11} />
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                <div className="flex items-end gap-3 p-3 rounded-lg border"
                     style={{ background: 'var(--paper)', borderColor: 'var(--line)' }}>
                  {inBuildMode && (
                    <>
                      <input
                        ref={imageInputRef}
                        type="file"
                        accept="image/*,.pdf,.docx,.xlsx,.xls,.csv,.txt,.md"
                        multiple
                        onChange={handleBuildFileAttach}
                        className="hidden"
                      />
                      <button
                        onClick={() => imageInputRef.current?.click()}
                        className="w-8 h-8 rounded-md flex items-center justify-center flex-shrink-0 text-[var(--ink-mute)] hover:text-[var(--forest)] hover:bg-[var(--mint)]"
                        title={t.attachFiles}
                      >
                        <Paperclip size={14} />
                      </button>
                    </>
                  )}
                  <textarea
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend();
                      }
                    }}
                    placeholder={
                      currentModule === 'onboarding' ? t.typeAnswer :
                      inBuildMode ? t.buildPlaceholder :
                      currentModule === 'resume' ? t.askFollowup :
                      t.typeAnswer
                    }
                    rows={1}
                    disabled={loading}
                    className="flex-1 resize-none bg-transparent text-[14px] leading-relaxed max-h-40 focus:outline-none disabled:opacity-50"
                    style={{ color: 'var(--ink)' }}
                  />
                  <button
                    onClick={handleSend}
                    disabled={(!input.trim() && pendingAttachments.length === 0) || loading}
                    className="w-9 h-9 rounded-md flex items-center justify-center transition-all disabled:opacity-30 flex-shrink-0"
                    style={{ background: 'var(--forest)', color: 'white' }}
                  >
                    {loading ? <Loader2 size={14} className="animate-spin" /> : <Send size={14} />}
                  </button>
                </div>
                <div className="text-[10px] mt-2 text-center" style={{ color: 'var(--ink-mute)' }}>
                  {inBuildMode ? t.inputHintBuild : t.inputHint}
                </div>
              </div>
            </div>
          )}
        </main>

        {showMemory && (
          <MemoryModal
            t={t}
            profile={profile}
            resumes={resumes}
            onClose={() => setShowMemory(false)}
            onClearAll={handleClearAll}
          />
        )}

        {editingResume && (
          editingResume.structured ? (
            <StructuredResumeEditor
              key={editingResume.id}
              t={t}
              resume={editingResume}
              onClose={() => setEditingResumeId(null)}
              onSave={(update) => saveEditedResume(editingResume.id, update)}
              profile={profile}
              language={language}
            />
          ) : (
            <ResumeEditor
              key={editingResume.id}
              t={t}
              resume={editingResume}
              onClose={() => setEditingResumeId(null)}
              onSave={(newText) => saveEditedResume(editingResume.id, newText)}
              profile={profile}
              language={language}
              onUpgradeToStructured={async () => {
                const structured = await parseResumeTextToStructured(editingResume.text, language);
                if (structured) {
                  saveEditedResume(editingResume.id, structured);
                }
              }}
            />
          )
        )}
      </div>
    </>
  );
}

// Helper: extract plain text from possibly-array content (for display fallback)
function extractTextContent(content) {
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    return content.filter(b => b.type === 'text').map(b => b.text).join('\n');
  }
  return '';
}

// ───────────────────────────────────────────────────────────────
// Message bubble
// ───────────────────────────────────────────────────────────────
function MessageBubble({ role, children, attachments }) {
  if (role === 'user') {
    const imageAtts = attachments?.filter(a => a.kind === 'image') || [];
    const textAtts  = attachments?.filter(a => a.kind === 'text')  || [];
    return (
      <div className="flex justify-end fade-in">
        <div className="max-w-[78%] flex flex-col items-end gap-2">
          {imageAtts.length > 0 && (
            <div className="flex flex-wrap gap-2 justify-end">
              {imageAtts.map(att => (
                <img
                  key={att.id}
                  src={`data:${att.mediaType};base64,${att.base64}`}
                  alt={att.name}
                  className="max-h-32 max-w-[180px] rounded-lg object-cover"
                  style={{ border: '1px solid var(--line)' }}
                />
              ))}
            </div>
          )}
          {textAtts.length > 0 && (
            <div className="flex flex-wrap gap-2 justify-end">
              {textAtts.map(att => (
                <div key={att.id}
                     className="flex items-center gap-2 px-2.5 py-1.5 rounded-md"
                     style={{ background: 'var(--mint)', border: '1px solid var(--line)' }}>
                  <FileText size={11} color="var(--forest)" />
                  <span className="text-[11px]" style={{ color: 'var(--forest)' }}>{att.name}</span>
                </div>
              ))}
            </div>
          )}
          <div className="px-5 py-3 rounded-2xl rounded-tr-sm text-[14px] leading-relaxed whitespace-pre-wrap"
               style={{ background: 'var(--forest)', color: 'white' }}>
            {children}
          </div>
        </div>
      </div>
    );
  }
  return (
    <div className="flex gap-4 fade-in">
      <div className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"
           style={{ background: 'var(--mint)' }}>
        <Sparkles size={12} color="var(--forest)" />
      </div>
      <div className="flex-1 min-w-0 pt-0.5" style={{ color: 'var(--ink)' }}>
        {children}
      </div>
    </div>
  );
}

function InterviewMessage({ t, meta }) {
  if (meta.done) {
    return (
      <div>
        <div className="eyebrow mb-2" style={{ color: 'var(--sage)' }}>{t.interviewComplete}</div>
        <div className="text-[14.5px] leading-relaxed">{renderMarkdown(meta.feedback)}</div>
        {meta.rubric && <RubricBars t={t} rubric={meta.rubric} />}
        <div className="mt-5 p-4 rounded-md flex items-center gap-3" style={{ background: 'var(--mint)' }}>
          <Check size={14} color="var(--forest)" />
          <div className="text-[12px]" style={{ color: 'var(--forest)' }}>
            {t.rubricSaved} <strong>{t.rubricSavedProgress}</strong>.
          </div>
        </div>
      </div>
    );
  }
  return (
    <div>
      {meta.feedback && (
        <div>
          <div className="eyebrow mb-2">{t.feedbackLabel}</div>
          <div className="text-[14px] leading-relaxed" style={{ color: 'var(--ink-soft)' }}>
            {renderMarkdown(meta.feedback)}
