// ───────────────────────────────────────────────────────────────
// Resume Editor — split pane with highlight optimize + chat + export
// ───────────────────────────────────────────────────────────────
function ResumeEditor({ t, resume, onClose, onSave, profile, language, onUpgradeToStructured }) {
  const [content, setContent] = useState(resume.text);
  const [undoStack, setUndoStack] = useState([]);
  const [editorMessages, setEditorMessages] = useState([]);
  const [editorInput, setEditorInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [upgrading, setUpgrading] = useState(false);
  const [selection, setSelection] = useState(null); // {start, end, text}
  const [customPrompt, setCustomPrompt] = useState('');
  const [exportStatus, setExportStatus] = useState(null);
  const textareaRef = useRef(null);
  const chatEndRef = useRef(null);

  const handleUpgrade = async () => {
    if (!onUpgradeToStructured) return;
    setUpgrading(true);
    try {
      await onUpgradeToStructured();
    } finally {
      setUpgrading(false);
    }
  };

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [editorMessages, loading]);

  const handleSelect = () => {
    const ta = textareaRef.current;
    if (!ta) return;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    if (start === end) {
      setSelection(null);
      return;
    }
    setSelection({ start, end, text: ta.value.substring(start, end) });
  };

  const pushUndo = (prevContent) => {
    setUndoStack(s => [...s.slice(-9), prevContent]);
  };

  const handleUndo = () => {
    if (undoStack.length === 0) return;
    const prev = undoStack[undoStack.length - 1];
    setContent(prev);
    onSave(prev);
    setUndoStack(s => s.slice(0, -1));
  };

  const applySelectionEdit = async (action) => {
    if (!selection) return;
    setLoading(true);
    const { system, messages } = buildSelectionEditPrompt({
      content, selection: selection.text, action, language,
    });
    const result = await callClaude({ messages, system, maxTokens: 600 });
    setLoading(false);
    if (result.raw) {
      pushUndo(content);
      let newText = result.raw.trim();
      // Strip wrapping quotes if present
      if ((newText.startsWith('"') && newText.endsWith('"'))
       || (newText.startsWith('"') && newText.endsWith('"'))) {
        newText = newText.slice(1, -1);
      }
      const newContent = content.slice(0, selection.start) + newText + content.slice(selection.end);
      setContent(newContent);
      onSave(newContent);
      setSelection(null);
      setCustomPrompt('');
    }
  };

  const sendChatMessage = async () => {
    const text = editorInput.trim();
    if (!text || loading) return;
    setEditorInput('');
    const newMessages = [...editorMessages, { role: 'user', content: text }];
    setEditorMessages(newMessages);
    setLoading(true);

    const system = buildEditorChatPrompt({ content, profile, language });
    const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
    const result = await callClaude({ messages: apiMessages, system, maxTokens: 4000 });
    setLoading(false);

    let responseText = result.raw || (result.error ? `⚠️ ${result.error}` : '(No response)');
    let revisedContent = null;
    const revisedMatch = responseText.match(/\[REVISED\]([\s\S]*?)\[\/REVISED\]/);
    if (revisedMatch) {
      revisedContent = revisedMatch[1].trim();
      responseText = responseText.replace(/\[REVISED\][\s\S]*?\[\/REVISED\]/, '').trim();
    }

    setEditorMessages(prev => [...prev, {
      role: 'assistant',
      content: responseText,
      revised: revisedContent,
    }]);
  };

  const applyRevision = (revised) => {
    pushUndo(content);
    setContent(revised);
    onSave(revised);
  };

  // ── PDF export
  const exportPdf = async () => {
    setExportStatus(t.loadingPdfLib);
    try {
      const html2pdf = await loadHtml2Pdf();
      setExportStatus(t.generatingPdf);
      const container = document.createElement('div');
      container.style.cssText = 'font-family: Georgia, "Times New Roman", serif; padding: 40px 50px; max-width: 720px; color: #1A2420; line-height: 1.5; font-size: 11pt;';
      const html = content
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .split('\n')
        .map(line => {
          if (/^#\s/.test(line))    return `<h1 style="font-size: 20pt; margin: 16px 0 8px; color: #0F3D2E; font-weight: 600;">${line.replace(/^#\s/, '')}</h1>`;
          if (/^##\s/.test(line))   return `<h2 style="font-size: 14pt; margin: 14px 0 6px; color: #0F3D2E; border-bottom: 1px solid #aaa; padding-bottom: 2px; font-weight: 600;">${line.replace(/^##\s/, '')}</h2>`;
          if (/^###\s/.test(line))  return `<h3 style="font-size: 12pt; margin: 10px 0 4px; color: #0F3D2E; font-weight: 600;">${line.replace(/^###\s/, '')}</h3>`;
          if (/^[-•*]\s/.test(line)) return `<div style="margin: 2px 0 2px 20px;">• ${line.replace(/^[-•*]\s/, '')}</div>`;
          if (line.trim() === '')   return '<div style="height: 6px;"></div>';
          return `<div>${line}</div>`;
        }).join('');
      container.innerHTML = html;
      document.body.appendChild(container);

      await html2pdf().from(container).set({
        margin: [10, 10, 10, 10],
        filename: resume.filename.replace(/\.[^.]+$/, '') + '.pdf',
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      }).save();
      document.body.removeChild(container);
      setExportStatus(null);
    } catch (err) {
      setExportStatus(t.pdfFailed(err.message));
      setTimeout(() => setExportStatus(null), 4000);
    }
  };

  // ── Excel export
  const exportExcel = async () => {
    setExportStatus(t.loadingExcelLib);
    try {
      const XLSX = await loadXlsx();
      setExportStatus(t.generatingExcel);
      const lines = content.split('\n');
      const data = [['Section', 'Content']];
      let currentSection = '(header)';
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        if (/^#{1,3}\s/.test(trimmed)) {
          currentSection = trimmed.replace(/^#+\s/, '');
          data.push([currentSection, '']);
        } else {
          data.push(['', trimmed.replace(/^[-•*]\s/, '')]);
        }
      }
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{ wch: 24 }, { wch: 80 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Resume');
      XLSX.writeFile(wb, resume.filename.replace(/\.[^.]+$/, '') + '.xlsx');
      setExportStatus(null);
    } catch (err) {
      setExportStatus(t.excelFailed(err.message));
      setTimeout(() => setExportStatus(null), 4000);
    }
  };

  // ── DOCX export (parses markdown content into paragraphs)
  const exportDocx = async () => {
    setExportStatus(t.loadingDocxLib);
    try {
      setExportStatus(t.generatingDocx);
      const blob = await buildMarkdownResumeDocx(content);
      downloadBlob(blob, resume.filename.replace(/\.[^.]+$/, '') + '.docx');
      setExportStatus(null);
    } catch (err) {
      setExportStatus(t.docxFailed(err.message));
      setTimeout(() => setExportStatus(null), 4000);
    }
  };

  return (
    <div className="fixed inset-0 z-40 flex flex-col fade-in" style={{ background: 'var(--bg)' }}>
      {/* Header */}
      <div className="px-8 py-4 flex items-center justify-between flex-shrink-0"
           style={{ borderBottom: '1px solid var(--line-soft)', background: 'var(--paper)' }}>
        <div className="flex items-center gap-4">
          <button onClick={onClose}
                  className="w-8 h-8 rounded-md flex items-center justify-center hover:bg-[var(--bg-sunk)]">
            <X size={16} />
          </button>
          <div>
            <div className="eyebrow">{t.editorTitle}</div>
            <div className="font-display text-[18px]" style={{ color: 'var(--forest)' }}>{resume.filename}</div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          {exportStatus && (
            <div className="text-[11px] px-3" style={{ color: 'var(--ink-mute)' }}>
              {exportStatus}
            </div>
          )}
          {onUpgradeToStructured && (
            <button onClick={handleUpgrade} disabled={upgrading || loading}
                    className="px-3 py-2 rounded-md text-[12px] border flex items-center gap-1.5 disabled:opacity-50"
                    style={{ borderColor: 'var(--sage)', color: 'var(--forest)', background: 'var(--mint)' }}>
              {upgrading ? <Loader2 size={12} className="animate-spin" /> : <Sparkles size={12} />}
              {language === 'zh' ? '转为可视化编辑器' : 'Visual editor'}
            </button>
          )}
          {undoStack.length > 0 && (
            <button onClick={handleUndo}
                    className="px-3 py-2 rounded-md text-[12px] border flex items-center gap-1.5"
                    style={{ borderColor: 'var(--line)', color: 'var(--ink-soft)' }}>
              <Undo2 size={12} /> {t.undo}
            </button>
          )}
          <button onClick={exportPdf} disabled={loading}
                  className="px-4 py-2 rounded-md text-[12px] font-medium flex items-center gap-1.5 disabled:opacity-50"
                  style={{ background: 'var(--forest)', color: 'white' }}>
            <Download size={12} /> {t.exportPdf}
          </button>
          <button onClick={exportDocx} disabled={loading}
                  className="px-4 py-2 rounded-md text-[12px] font-medium flex items-center gap-1.5 border disabled:opacity-50"
                  style={{ borderColor: 'var(--forest)', color: 'var(--forest)' }}>
            <Download size={12} /> {t.exportDocx}
          </button>
          <button onClick={exportExcel} disabled={loading}
                  className="px-4 py-2 rounded-md text-[12px] font-medium flex items-center gap-1.5 border disabled:opacity-50"
                  style={{ borderColor: 'var(--forest)', color: 'var(--forest)' }}>
            <Download size={12} /> {t.exportExcel}
          </button>
        </div>
      </div>

      {/* Selection toolbar */}
      {selection && (
        <div className="px-8 py-3 flex items-center gap-2 flex-wrap fade-in"
             style={{ background: 'var(--mint)', borderBottom: '1px solid var(--line-soft)' }}>
          <div className="text-[11px] uppercase tracking-wider" style={{ color: 'var(--forest)' }}>
            {t.selectedChars(selection.text.length)}
          </div>
          {[
            { label: t.optConcise,      action: 'make this more concise and punchy' },
            { label: t.optMetrics,      action: 'add quantified metrics and numbers to make this more impactful' },
            { label: t.optVerbs,        action: 'rewrite using stronger action verbs' },
            { label: t.optProfessional, action: 'rewrite in a professional recruiter-friendly tone' },
          ].map(opt => (
            <button
              key={opt.label}
              onClick={() => applySelectionEdit(opt.action)}
              disabled={loading}
              className="px-3 py-1 rounded-md text-[11px] font-medium disabled:opacity-50"
              style={{ background: 'var(--forest)', color: 'white' }}
            >
              {opt.label}
            </button>
          ))}
          <input
            value={customPrompt}
            onChange={e => setCustomPrompt(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter' && customPrompt.trim()) {
                applySelectionEdit(customPrompt.trim());
              }
            }}
            placeholder={t.customInstructionPlaceholder}
            className="px-3 py-1 rounded-md text-[11px] border bg-white flex-1 min-w-[180px]"
            style={{ borderColor: 'var(--forest)' }}
          />
          {loading && <Loader2 size={12} className="animate-spin" color="var(--forest)" />}
        </div>
      )}

      {/* Split pane */}
      <div className="flex-1 flex min-h-0">
        {/* Editor */}
        <div className="flex-1 overflow-y-auto p-10" style={{ background: 'var(--paper)' }}>
          <div className="max-w-2xl mx-auto">
            <div className="text-[11px] mb-4" style={{ color: 'var(--ink-mute)' }}>
              {t.editorHint}
            </div>
            <textarea
              ref={textareaRef}
              value={content}
              onChange={e => { setContent(e.target.value); onSave(e.target.value); }}
              onSelect={handleSelect}
              onMouseUp={handleSelect}
              onKeyUp={handleSelect}
              spellCheck={false}
              className="w-full focus:outline-none resize-none"
              style={{
                minHeight: '75vh',
                color: 'var(--ink)',
                background: 'transparent',
                border: 'none',
                fontFamily: "'Geist Mono', ui-monospace, monospace",
                fontSize: '13px',
                lineHeight: '1.7',
              }}
            />
          </div>
        </div>

        {/* Chat */}
        <div className="w-[400px] flex flex-col border-l flex-shrink-0"
             style={{ borderColor: 'var(--line-soft)', background: 'var(--bg-sunk)' }}>
          <div className="px-5 py-4" style={{ borderBottom: '1px solid var(--line-soft)' }}>
            <div className="eyebrow">{t.refinementChat}</div>
            <div className="text-[11px] mt-1" style={{ color: 'var(--ink-soft)' }}>
              {t.refinementSub}
            </div>
          </div>

          <div className="flex-1 overflow-y-auto px-5 py-4 space-y-4 chat-scroll">
            {editorMessages.length === 0 && !loading && (
              <div className="text-[12px] space-y-2" style={{ color: 'var(--ink-mute)' }}>
                <div>{t.tryLabel}</div>
                <div className="italic">{t.example1}</div>
                <div className="italic">{t.example2}</div>
                <div className="italic">{t.example3}</div>
                <div className="italic">{t.example4}</div>
              </div>
            )}
            {editorMessages.map((m, idx) => (
              <div key={idx} className="fade-in">
                {m.role === 'user' ? (
                  <div className="flex justify-end">
                    <div className="max-w-[85%] px-3 py-2 rounded-xl rounded-tr-sm text-[12px] leading-relaxed"
                         style={{ background: 'var(--forest)', color: 'white' }}>
                      {m.content}
                    </div>
                  </div>
                ) : (
                  <div>
                    <div className="flex gap-2 items-start">
                      <div className="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"
                           style={{ background: 'var(--mint)' }}>
                        <Sparkles size={9} color="var(--forest)" />
                      </div>
                      <div className="flex-1 text-[12px] leading-relaxed" style={{ color: 'var(--ink)' }}>
                        {renderMarkdown(m.content)}
                      </div>
                    </div>
                    {m.revised && (
                      <button
                        onClick={() => applyRevision(m.revised)}
                        className="mt-2 ml-7 flex items-center gap-1.5 px-2.5 py-1.5 rounded-md text-[10px] font-medium"
                        style={{ background: 'var(--mint)', color: 'var(--forest)', border: '1px solid var(--forest)' }}
                      >
                        <Check size={10} /> {t.applyRevision}
                      </button>
                    )}
                  </div>
                )}
              </div>
            ))}
            {loading && (
              <div className="flex gap-2 items-center">
                <div className="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0"
                     style={{ background: 'var(--mint)' }}>
                  <Sparkles size={9} color="var(--forest)" />
                </div>
                <div className="dots py-1"><span /><span /><span /></div>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          <div className="p-4" style={{ borderTop: '1px solid var(--line-soft)' }}>
            <div className="flex items-end gap-2 p-2 rounded-md border"
                 style={{ background: 'var(--paper)', borderColor: 'var(--line)' }}>
              <textarea
                value={editorInput}
                onChange={e => setEditorInput(e.target.value)}
                onKeyDown={e => {
                  if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendChatMessage();
                  }
                }}
                placeholder={t.askForChange}
                rows={1}
                className="flex-1 resize-none bg-transparent text-[12px] max-h-32 focus:outline-none"
              />
              <button
                onClick={sendChatMessage}
                disabled={!editorInput.trim() || loading}
                className="w-7 h-7 rounded-md flex items-center justify-center disabled:opacity-30 flex-shrink-0"
                style={{ background: 'var(--forest)', color: 'white' }}
              >
                <Send size={12} />
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────────────────────────────────────────
// Structured Resume Editor — WYSIWYG field-level editing
// ───────────────────────────────────────────────────────────────
function StructuredResumeEditor({ t, resume, onClose, onSave, profile, language }) {
  const [data, setData] = useState(resume.structured || EMPTY_RESUME());
  const [undoStack, setUndoStack] = useState([]);
  const [chatMessages, setChatMessages] = useState([]);
  const [chatInput, setChatInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [optimizing, setOptimizing] = useState(null); // { secIdx, itemIdx, bulletIdx }
  const [exportStatus, setExportStatus] = useState(null);
  const chatEndRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [chatMessages, loading]);

  const pushUndo = (prev) => setUndoStack(s => [...s.slice(-19), prev]);

  const commit = (newData) => {
    pushUndo(data);
    setData(newData);
    onSave(newData);
  };

  const handleUndo = () => {
    if (!undoStack.length) return;
    const prev = undoStack[undoStack.length - 1];
    setData(prev);
    onSave(prev);
    setUndoStack(s => s.slice(0, -1));
  };

  // ── Field mutators
  const updateHeader = (field, value) => {
    commit({ ...data, header: { ...data.header, [field]: value } });
  };

  const updateItemField = (secIdx, itemIdx, field, value) => {
    const next = structuredClone(data);
    next.sections[secIdx].items[itemIdx][field] = value;
    commit(next);
  };

  const updateBullet = (secIdx, itemIdx, bulletIdx, value) => {
    const next = structuredClone(data);
    next.sections[secIdx].items[itemIdx].bullets[bulletIdx] = value;
    commit(next);
  };

  const updateSectionTitle = (secIdx, value) => {
    const next = structuredClone(data);
    next.sections[secIdx].title = value;
    commit(next);
  };

  const addBullet = (secIdx, itemIdx) => {
    const next = structuredClone(data);
    next.sections[secIdx].items[itemIdx].bullets.push('');
    commit(next);
  };

  const removeBullet = (secIdx, itemIdx, bulletIdx) => {
    const next = structuredClone(data);
    next.sections[secIdx].items[itemIdx].bullets.splice(bulletIdx, 1);
    commit(next);
  };

  const addItem = (secIdx) => {
    const next = structuredClone(data);
    next.sections[secIdx].items.push(EMPTY_ITEM());
    commit(next);
  };

  const removeItem = (secIdx, itemIdx) => {
    if (!confirm(language === 'zh' ? '删除这一条？' : 'Delete this entry?')) return;
    const next = structuredClone(data);
    next.sections[secIdx].items.splice(itemIdx, 1);
    commit(next);
  };

  const addSection = () => {
    const next = structuredClone(data);
    next.sections.push({
      type: 'other',
      title: language === 'zh' ? '新小节' : 'New Section',
      items: [EMPTY_ITEM()],
    });
    commit(next);
  };

  const removeSection = (secIdx) => {
    if (!confirm(language === 'zh' ? '删除整个小节？' : 'Delete entire section?')) return;
    const next = structuredClone(data);
    next.sections.splice(secIdx, 1);
    commit(next);
  };

  // ── AI optimize a single bullet
  const optimizeBullet = async (secIdx, itemIdx, bulletIdx, action) => {
    const bullet = data.sections[secIdx].items[itemIdx].bullets[bulletIdx];
    if (!bullet) return;
    setOptimizing({ secIdx, itemIdx, bulletIdx });

    const langInstr = language === 'zh' ? 'Respond in Chinese.' : 'Respond in English.';
    const system = `You are an expert resume editor. Rewrite the given bullet point using strong action verbs, concrete metrics, concise professional language. Do NOT add content unsupported by the original. ${langInstr} Output ONLY the rewritten bullet, no quotes, no explanations.`;
    const userMsg = `Original bullet: ${bullet}\n\nAction: ${action}`;

    const result = await callClaude({
      messages: [{ role: 'user', content: userMsg }],
      system,
      maxTokens: 300,
    });
    setOptimizing(null);
    if (result.raw) {
      let newBullet = result.raw.trim().replace(/^[-•*]\s*/, '').replace(/^["'"]|["'"]$/g, '');
      const next = structuredClone(data);
      next.sections[secIdx].items[itemIdx].bullets[bulletIdx] = newBullet;
      commit(next);
    }
  };

  // ── Chat to refine whole resume
  const sendChatMessage = async () => {
    const text = chatInput.trim();
    if (!text || loading) return;
    setChatInput('');
    const newMessages = [...chatMessages, { role: 'user', content: text }];
    setChatMessages(newMessages);
    setLoading(true);

    const langInstr = language === 'zh' ? 'Respond in Chinese.' : 'Respond in English.';
    const system = `You are an expert resume editor working on a structured resume. Current resume JSON:

${JSON.stringify(data, null, 2)}

${langInstr}

${TONE_STANDARD}

When the student asks for a change:
1. Give a 1-2 sentence explanation of what you're changing.
2. At the END of your message, output the COMPLETE revised resume JSON wrapped in [REVISED_JSON]...[/REVISED_JSON] tags. Schema: { header: {name, phone, email, location, links}, sections: [{type, title, items: [{org, role, location, dateRange, bullets}]}] }. Every item MUST have all 5 fields.

If the request doesn't require changes, just answer briefly without the tags.`;

    const apiMessages = newMessages.map(m => ({ role: m.role, content: m.content }));
    const result = await callClaude({ messages: apiMessages, system, maxTokens: 4500 });
    setLoading(false);

    let responseText = result.raw || (result.error ? `⚠️ ${result.error}` : '(No response)');
    let revisedData = null;
    const m = responseText.match(/\[REVISED_JSON\]([\s\S]*?)\[\/REVISED_JSON\]/);
    if (m) {
      try {
        revisedData = JSON.parse(m[1].trim());
      } catch (e) { console.error('Failed to parse REVISED_JSON', e); }
      responseText = responseText.replace(/\[REVISED_JSON\][\s\S]*?\[\/REVISED_JSON\]/, '').trim();
    }
    setChatMessages(prev => [...prev, { role: 'assistant', content: responseText, revised: revisedData }]);
  };

  const applyRevision = (revised) => {
    commit(revised);
  };

  // ── PDF export — matches the visual style of the WYSIWYG
  const exportPdf = async () => {
    setExportStatus(t.loadingPdfLib);
    try {
      const html2pdf = await loadHtml2Pdf();
      setExportStatus(t.generatingPdf);

      const esc = (s) => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const contact = [data.header?.phone, data.header?.email, data.header?.location]
        .filter(Boolean).map(esc).join(' &nbsp;|&nbsp; ');

      const sectionsHtml = (data.sections || []).map(sec => {
        const itemsHtml = (sec.items || []).map(item => {
          const topLeft = esc(item.org);
          const topRight = esc(item.location);
          const midLeft = esc(item.role);
          const midRight = esc(item.dateRange);
          const bulletsHtml = (item.bullets || []).filter(Boolean).map(b =>
            `<div style="margin: 3px 0 3px 18px; text-indent: -12px; padding-left: 12px;">■ ${esc(b)}</div>`
          ).join('');
          return `
            <div style="margin-bottom: 10px;">
              ${(topLeft || topRight) ? `<div style="display: flex; justify-content: space-between; font-weight: 700;"><span>${topLeft}</span><span>${topRight}</span></div>` : ''}
              ${(midLeft || midRight) ? `<div style="display: flex; justify-content: space-between; font-style: italic; color: #333;"><span>${midLeft}</span><span>${midRight}</span></div>` : ''}
              ${bulletsHtml}
            </div>`;
        }).join('');
        return `
          <section style="margin-top: 14px;">
            <h2 style="font-size: 13pt; font-weight: 700; margin: 0 0 4px; padding-bottom: 2px; border-bottom: 1.5px solid #000;">${esc(sec.title)}</h2>
            ${itemsHtml}
          </section>`;
      }).join('');

      const container = document.createElement('div');
      container.style.cssText = 'font-family: "Times New Roman", Times, serif; padding: 32px 40px; max-width: 760px; color: #000; line-height: 1.4; font-size: 10.5pt;';
      container.innerHTML = `
        <div style="text-align: center; margin-bottom: 6px;">
          <div style="font-size: 22pt; font-weight: 700; letter-spacing: 1px;">${esc(data.header?.name)}</div>
          <div style="font-size: 10pt; color: #222; margin-top: 2px;">${contact}</div>
        </div>
        ${sectionsHtml}
      `;
      document.body.appendChild(container);

      await html2pdf().from(container).set({
        margin: [10, 10, 10, 10],
        filename: (data.header?.name || 'resume') + '.pdf',
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      }).save();
      document.body.removeChild(container);
      setExportStatus(null);
    } catch (err) {
      setExportStatus(t.pdfFailed(err.message));
      setTimeout(() => setExportStatus(null), 4000);
    }
  };

  // ── Excel export — structured rows
  const exportExcel = async () => {
    setExportStatus(t.loadingExcelLib);
    try {
      const XLSX = await loadXlsx();
      setExportStatus(t.generatingExcel);
      const rows = [['Section', 'Org', 'Role', 'Location', 'Date', 'Bullet']];
      for (const sec of data.sections || []) {
        for (const item of sec.items || []) {
          const bullets = item.bullets?.length ? item.bullets : [''];
          for (const b of bullets) {
            rows.push([sec.title || '', item.org || '', item.role || '', item.location || '', item.dateRange || '', b || '']);
          }
        }
      }
      const ws = XLSX.utils.aoa_to_sheet(rows);
      ws['!cols'] = [{ wch: 18 }, { wch: 28 }, { wch: 28 }, { wch: 14 }, { wch: 16 }, { wch: 60 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Resume');
      XLSX.writeFile(wb, (data.header?.name || 'resume') + '.xlsx');
      setExportStatus(null);
    } catch (err) {
      setExportStatus(t.excelFailed(err.message));
      setTimeout(() => setExportStatus(null), 4000);
    }
  };

  // ── DOCX export — native Word format
  const exportDocx = async () => {
    setExportStatus(t.loadingDocxLib);
    try {
      setExportStatus(t.generatingDocx);
      const blob = await buildStructuredResumeDocx(data);
      downloadBlob(blob, (data.header?.name || 'resume') + '.docx');
      setExportStatus(null);
    } catch (err) {
      setExportStatus(t.docxFailed(err.message));
      setTimeout(() => setExportStatus(null), 4000);
    }
  };

  // ── Inline editable field
  const Editable = ({ value, onChange, placeholder, className, style, multiline, align }) => {
    const [local, setLocal] = useState(value || '');
    useEffect(() => { setLocal(value || ''); }, [value]);
    const commonProps = {
      value: local,
      onChange: (e) => setLocal(e.target.value),
      onBlur: () => { if (local !== value) onChange(local); },
      placeholder: placeholder || '',
      className: className || '',
      style: {
        background: 'transparent',
        border: 'none',
        outline: 'none',
        width: '100%',
        padding: '1px 2px',
        borderRadius: '2px',
        textAlign: align || 'left',
        ...style,
      },
      onFocus: (e) => { e.target.style.background = '#FFF9E6'; },
      onBlurCapture: (e) => { e.target.style.background = 'transparent'; },
    };
    if (multiline) {

function AuthPage({ onLogin, onBack, language }) {
  const isZh = language === 'zh';
  const [mode, setMode] = useState('signup');
  const [email, setEmail] = useState('');
  const [phone, setPhone] = useState('');
  const [password, setPassword] = useState('');
  const [confirm, setConfirm] = useState('');
  const [error, setError] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [signupDone, setSignupDone] = useState(false);

  const submitSignup = async () => {
    setError(null);
    if (!email) { setError(isZh ? '需要邮箱' : 'Email required'); return; }
    if (!password || password.length < 6) { setError(isZh ? '密码至少 6 位' : 'Password must be 6+ chars'); return; }
    if (password !== confirm) { setError(isZh ? '两次密码不一致' : 'Passwords do not match'); return; }
    setSubmitting(true);
    try {
      const { data, error: authErr } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { phone: phone || '' } },
      });
      if (authErr) throw authErr;
      if (data.session) {
        // Auto-confirmed (email confirm disabled in Supabase settings)
        currentUserId = data.user.id;
        dataCache = {};
        onLogin();
      } else {
        // Email confirmation required
        setSignupDone(true);
      }
    } catch (e) {
      setError(e.message);
    } finally {
      setSubmitting(false);
    }
  };

  const submitLogin = async () => {
    setError(null);
    if (!email) { setError(isZh ? '需要邮箱' : 'Email required'); return; }
    if (!password) { setError(isZh ? '需要密码' : 'Password required'); return; }
    setSubmitting(true);
    try {
      const { data, error: authErr } = await supabase.auth.signInWithPassword({
        email,
        password,
      });
      if (authErr) throw authErr;
      currentUserId = data.user.id;
      dataCache = {};
      onLogin();
    } catch (e) {
      setError(e.message);
    } finally {
      setSubmitting(false);
    }
  };

  if (signupDone) {
    return (
      <div className="min-h-screen flex flex-col" style={{ background: 'var(--bg)' }}>
        <nav className="px-10 py-6">
          <button onClick={onBack} className="flex items-center gap-2">
            <div className="w-2 h-2 rounded-full" style={{ background: 'var(--forest)' }} />
            <div className="font-display text-[22px]" style={{ color: 'var(--forest)' }}>
              Coach<span className="italic" style={{ color: 'var(--sage)' }}>.</span>
            </div>
          </button>
        </nav>
        <div className="flex-1 flex items-center justify-center px-6">
          <div className="max-w-md p-8 rounded-lg border text-center" style={{ background: 'var(--paper)', borderColor: 'var(--line-soft)' }}>
            <div className="w-14 h-14 rounded-full mx-auto mb-4 flex items-center justify-center" style={{ background: 'var(--mint)' }}>
              <Check size={20} color="var(--forest)" />
            </div>
            <h2 className="font-display text-[24px] mb-3" style={{ color: 'var(--forest)' }}>
              {isZh ? '查看你的邮箱' : 'Check your email'}
            </h2>
            <p className="text-[14px] mb-5" style={{ color: 'var(--ink-soft)' }}>
              {isZh ? `我们向 ${email} 发送了一封确认邮件。点击邮件中的链接完成注册，然后回来登录。`
                    : `We sent a confirmation email to ${email}. Click the link in the email to verify your account, then come back and log in.`}
            </p>
            <button onClick={() => { setSignupDone(false); setMode('login'); }}
                    className="px-5 py-2.5 rounded-md text-[13px] font-medium"
                    style={{ background: 'var(--forest)', color: 'white' }}>
              {isZh ? '去登录' : 'Go to log in'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col" style={{ background: 'var(--bg)' }}>
      <nav className="px-10 py-6">
        <button onClick={onBack} className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full" style={{ background: 'var(--forest)' }} />
          <div className="font-display text-[22px]" style={{ color: 'var(--forest)' }}>
            Coach<span className="italic" style={{ color: 'var(--sage)' }}>.</span>
          </div>
        </button>
      </nav>

      <div className="flex-1 flex items-start justify-center px-6 py-10">
        <div className="w-full max-w-md">
          <div className="p-8 rounded-lg border" style={{ background: 'var(--paper)', borderColor: 'var(--line-soft)' }}>
            <div className="eyebrow mb-2">{isZh ? '欢迎' : 'Welcome'}</div>
            <h2 className="font-display text-[28px] leading-none mb-6" style={{ color: 'var(--forest)' }}>
              {mode === 'signup' ? (isZh ? '创建账号' : 'Create account') : (isZh ? '登录' : 'Log in')}
            </h2>

            <div className="flex gap-1 p-1 rounded-md mb-5" style={{ background: 'var(--bg-sunk)' }}>
              <button onClick={() => { setMode('signup'); setError(null); }}
                      className="flex-1 py-2 rounded text-[12px] font-medium"
                      style={{ background: mode === 'signup' ? 'var(--paper)' : 'transparent',
                               color: mode === 'signup' ? 'var(--forest)' : 'var(--ink-soft)' }}>
                {isZh ? '注册' : 'Sign up'}
              </button>
              <button onClick={() => { setMode('login'); setError(null); }}
                      className="flex-1 py-2 rounded text-[12px] font-medium"
                      style={{ background: mode === 'login' ? 'var(--paper)' : 'transparent',
                               color: mode === 'login' ? 'var(--forest)' : 'var(--ink-soft)' }}>
                {isZh ? '登录' : 'Log in'}
              </button>
            </div>

            <div className="space-y-4">
              <div>
                <label className="block text-[11px] uppercase tracking-wider mb-1.5" style={{ color: 'var(--ink-mute)' }}>
                  {isZh ? '邮箱' : 'Email'}
                </label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                       placeholder="you@example.com"
                       className="w-full px-4 py-3 rounded-md text-[14px] border"
                       style={{ background: 'var(--paper)', borderColor: 'var(--line)' }} />
              </div>

              {mode === 'signup' && (
                <div>
                  <label className="block text-[11px] uppercase tracking-wider mb-1.5" style={{ color: 'var(--ink-mute)' }}>
                    {isZh ? '手机号（可选）' : 'Phone (optional)'}
                  </label>
                  <input type="tel" value={phone} onChange={e => setPhone(e.target.value)}
                         placeholder={isZh ? '+86 13800000000' : '+1 555 123 4567'}
                         className="w-full px-4 py-3 rounded-md text-[14px] border"
                         style={{ background: 'var(--paper)', borderColor: 'var(--line)' }} />
                </div>
              )}

              <div>
                <label className="block text-[11px] uppercase tracking-wider mb-1.5" style={{ color: 'var(--ink-mute)' }}>
                  {isZh ? '密码' : 'Password'}
                </label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                       placeholder={isZh ? '至少 6 位' : 'At least 6 characters'}
                       className="w-full px-4 py-3 rounded-md text-[14px] border"
                       style={{ background: 'var(--paper)', borderColor: 'var(--line)' }} />
              </div>

              {mode === 'signup' && (
                <div>
                  <label className="block text-[11px] uppercase tracking-wider mb-1.5" style={{ color: 'var(--ink-mute)' }}>
                    {isZh ? '确认密码' : 'Confirm password'}
                  </label>
                  <input type="password" value={confirm} onChange={e => setConfirm(e.target.value)}
                         className="w-full px-4 py-3 rounded-md text-[14px] border"
                         style={{ background: 'var(--paper)', borderColor: 'var(--line)' }} />
                </div>
              )}

              {error && (
                <div className="p-3 rounded-md text-[12px] flex items-start gap-2"
                     style={{ background: '#FDF5F3', border: '1px solid #E8C8C0', color: 'var(--danger)' }}>
                  <AlertCircle size={12} className="flex-shrink-0 mt-0.5" />
                  {error}
                </div>
              )}

              <button
                onClick={mode === 'signup' ? submitSignup : submitLogin}
                disabled={submitting}
                className="w-full px-5 py-3 rounded-md text-[13px] font-medium disabled:opacity-50"
                style={{ background: 'var(--forest)', color: 'white' }}>
                {submitting
                  ? (isZh ? '处理中…' : 'Working…')
                  : (mode === 'signup' ? (isZh ? '创建账号' : 'Create account') : (isZh ? '登录' : 'Log in'))}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// API Key modal — shown on first load after auth
// ═══════════════════════════════════════════════════════════════
function ApiKeyModal({ onSave, onClose, language, existing }) {
  const isZh = language === 'zh';
  const [key, setKey] = useState(existing || '');
  const valid = key.startsWith('sk-ant-');
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6"
         style={{ background: 'rgba(26, 36, 32, 0.5)' }}>
      <div className="max-w-lg w-full rounded-xl p-8 fade-in"
           style={{ background: 'var(--paper)', boxShadow: '0 20px 60px rgba(15,61,46,0.2)' }}>
        <div className="eyebrow mb-2">{isZh ? '连接 Anthropic API' : 'Connect your Anthropic API'}</div>
        <h3 className="font-display text-[24px] mb-4" style={{ color: 'var(--forest)' }}>
          {isZh ? '添加你的 API Key' : 'Add your API key'}
        </h3>
        <div className="text-[13px] leading-relaxed mb-5" style={{ color: 'var(--ink-soft)' }}>
          {isZh
            ? '这个演示版直接从你的浏览器调用 Anthropic API。你需要在 console.anthropic.com 创建一个 API key，并贴在下面。Key 只保存在你自己的浏览器本机，不会上传任何服务器。'
            : 'This demo calls the Anthropic API directly from your browser. You need to create an API key at console.anthropic.com and paste it below. The key is stored only in your local browser — never uploaded anywhere.'}
        </div>
        <input type="password" value={key} onChange={e => setKey(e.target.value)}
               placeholder="sk-ant-api03-..."
               className="w-full px-4 py-3 rounded-md text-[13px] border font-mono mb-3"
               style={{ background: 'var(--paper)', borderColor: valid ? 'var(--forest)' : 'var(--line)' }} />
        <div className="text-[11px] mb-5" style={{ color: 'var(--ink-mute)' }}>
          {isZh
            ? <>在 <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer" className="underline" style={{ color: 'var(--forest)' }}>console.anthropic.com/settings/keys</a> 创建。使用你自己的配额。</>
            : <>Create one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer" className="underline" style={{ color: 'var(--forest)' }}>console.anthropic.com/settings/keys</a>. You will use your own quota.</>}
        </div>
        <div className="flex gap-2">
          {existing && (
            <button onClick={onClose}
                    className="px-4 py-2.5 rounded-md text-[12px] border"
                    style={{ borderColor: 'var(--line)', color: 'var(--ink-soft)' }}>
              {isZh ? '取消' : 'Cancel'}
            </button>
          )}
          <button onClick={() => { if (key) { localStorage.setItem('coach:apiKey', key); onSave(); } }}
                  disabled={!key}
                  className="flex-1 px-5 py-2.5 rounded-md text-[13px] font-medium disabled:opacity-50"
                  style={{ background: 'var(--forest)', color: 'white' }}>
            {isZh ? '保存并继续' : 'Save and continue'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// Root router
// ═══════════════════════════════════════════════════════════════
function Root() {
  const [language, setLanguage] = useState('en');
  const [page, setPage] = useState('loading'); // 'loading' | 'landing' | 'auth' | 'app'

  // Check Supabase session on mount
  useEffect(() => {
    const loader = document.getElementById('init-loader');

    const initSession = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        currentUserId = session.user.id;
        dataCache = {};
        // Load language preference
        try {
          const { data } = await supabase.from('user_data').select('settings').eq('user_id', currentUserId).single();
          if (data?.settings?.language) setLanguage(data.settings.language);
        } catch {}
        setPage('app');
      } else {
        setPage('landing');
      }
      if (loader) loader.classList.remove('visible');
    };

    initSession();

    // Listen for auth state changes (e.g. email confirmation redirect)
    const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session?.user) {
        currentUserId = session.user.id;
        dataCache = {};
        setPage('app');
      } else if (event === 'SIGNED_OUT') {
        currentUserId = null;
        dataCache = {};
        setPage('landing');
      }
    });

    return () => subscription.unsubscribe();
  }, []);

  // Expose globals for CoachApp sidebar
  useEffect(() => {
    window.__coachLogout = async () => {
      await supabase.auth.signOut();
      currentUserId = null;
      dataCache = {};
      setPage('landing');
    };
  }, []);

  if (page === 'loading') return null; // init-loader spinner handles this
  if (page === 'landing') {
    return <LandingPage onStart={() => setPage('auth')} language={language} setLanguage={setLanguage} />;
  }
  if (page === 'auth') {
    return <AuthPage onLogin={() => setPage('app')} onBack={() => setPage('landing')} language={language} />;
  }
  // page === 'app'
  return (
    <>
      <CoachApp />
      <button
        onClick={() => window.__coachLogout && window.__coachLogout()}
        title={language === 'zh' ? '退出登录' : 'Log out'}
        className="fixed bottom-4 left-4 z-30 px-3 py-2 rounded-md text-[11px] font-medium border flex items-center gap-1.5 hover:bg-white"
        style={{ background: 'rgba(255,255,255,0.9)', borderColor: 'var(--line)', color: 'var(--ink-soft)' }}>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        {language === 'zh' ? '退出' : 'Log out'}
      </button>
    </>
  );
}

// Mount
const rootEl = document.getElementById('root');
const reactRoot = createRoot(rootEl);
reactRoot.render(<Root />);
  </script>
</body>
